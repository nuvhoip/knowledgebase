version: "3.9"

services:
  knowledge-nuvho:
    build:
      context: .
      dockerfile: Dockerfile
    image: knowledge-nuvho:latest
    container_name: knowledge-nuvho
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
