version: "3.9"

services:
  knowledge-nuvho-dev:
    image: node:20-alpine
    container_name: knowledge-nuvho-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    command: sh -c "npm install && npm run dev"
